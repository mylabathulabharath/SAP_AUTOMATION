version: '3.8'

services:
  # 1. SAP Simulator Backend (Port 8000)
  sap-backend:
    build:
      context: .
      dockerfile: apps/sap-simulator/backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./shared:/app/shared
    environment:
      - PYTHONUNBUFFERED=1

  # 2. Automation Engine API (Port 8001)
  automation-api:
    build:
      context: .
      dockerfile: apps/automation-engine/api/Dockerfile
    ports:
      - "8001:8001"
      - "6080:6080"
    volumes:
      - ./shared:/app/shared
      - ./apps/automation-engine/outputs:/app/apps/automation-engine/outputs
      - ./apps/automation-engine/uploads:/app/apps/automation-engine/uploads
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - sap-backend

  # 3. Next.js Frontend (Port 3000)
  frontend:
    build:
      context: ./apps/sap-simulator/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - sap-backend
      - automation-api
